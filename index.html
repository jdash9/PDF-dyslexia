<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Readable — Make PDFs dyslexia-friendly</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ABeeZee&family=Andika:wght@400;700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css?v=20260706">
</head>
<body>
<div class="app">

  <header class="topbar">
    <h1>Read<em>able</em></h1>
    <p class="tagline">Make PDFs dyslexia-friendly</p>
    <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <div class="columns">

    <aside class="sidebar">

      <div class="filebar hidden" id="filebar">
        <span class="dot"></span>
        <span class="name" id="fname">document.pdf</span>
        <span class="meta" id="fmeta"></span>
        <button class="linkbtn" id="reset">change</button>
      </div>

      <div class="opts-panel panel-disabled" id="opts-panel">

        <div class="field">
          <label class="field-label" for="o-font-select">Typeface</label>
          <div class="select-wrap">
            <select id="o-font-select">
              <option value="none">System sans-serif</option>
              <option value="opendyslexic">OpenDyslexic</option>
              <option value="andika">Andika</option>
              <option value="abeezee">ABeeZee</option>
              <option value="lexia">Lexia Readable</option>
              <option value="tiresias">Tiresias</option>
            </select>
          </div>
          <span class="font-status" id="font-status"></span>
        </div>

        <div class="divider"></div>

        <p class="section-label">Reading aids</p>
        <div class="opts" id="opts">

          <label class="opt">
            <input type="checkbox" id="o-line" data-opt="line" checked>
            <span class="box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
            <span class="txt"><strong>Line spacing</strong></span>
          </label>

          <label class="opt">
            <input type="checkbox" id="o-letter" data-opt="letter" checked>
            <span class="box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
            <span class="txt"><strong>Letter spacing</strong></span>
          </label>

          <label class="opt">
            <input type="checkbox" id="o-word" data-opt="word" checked>
            <span class="box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
            <span class="txt"><strong>Word spacing</strong></span>
          </label>

          <label class="opt">
            <input type="checkbox" id="o-bg" data-opt="bg" checked>
            <span class="box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
            <span class="txt"><strong>Easy-on-the-eyes background</strong><span>warm cream instead of harsh white</span></span>
          </label>

          <label class="opt">
            <input type="checkbox" id="o-confusable" data-opt="confusable" checked>
            <span class="box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
            <span class="txt">
              <strong>Confusable word detection</strong>
              <span>flags words that are often mixed up</span>
            </span>
          </label>


          <label class="opt">
            <input type="checkbox" id="o-split" data-opt="split" checked>
            <span class="box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
            <span class="txt"><strong>Sentence splitting</strong></span>
          </label>
        </div>

        <div class="sizefield">
          <label for="size">Text size — <span class="val" id="size-val">14 pt</span></label>
          <input type="range" id="size" min="10" max="24" step="1" value="14">
        </div>

        <button class="btn btn-primary" id="make" disabled>Generate &amp; download PDF</button>
        <div class="ocr-progress hidden" id="ocr-progress">
          <div class="ocr-progress-head">
            <span class="ocr-progress-label" id="ocr-progress-label">OCR in progress…</span>
            <span class="ocr-progress-text" id="ocr-progress-text">0%</span>
          </div>
          <div class="ocr-progress-track">
            <div class="ocr-progress-bar" id="ocr-progress-bar"></div>
          </div>
        </div>
        <span class="status" id="status"></span>

      </div>
    </aside>

    <!-- ── Right: large preview ── -->
    <main class="preview-col">

      <div class="zoom-bar hidden" id="zoom-bar">
        <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
        <span class="zoom-level" id="zoom-level">100 %</span>
        <button class="zoom-btn" id="zoom-in"  title="Zoom in">+</button>
        <button class="zoom-btn orientation-btn" id="orientation-toggle" title="Toggle page orientation" aria-label="Toggle page orientation">
          <span class="orientation-icon">
            <span class="orientation-box portrait"></span>
            <span class="orientation-box landscape"></span>
          </span>
        </button>
        <button class="zoom-btn zoom-reset" id="zoom-reset" title="Reset zoom">↺</button>
      </div>

      <div class="preview-frame" id="preview-frame">

        <div class="drop-overlay" id="drop">
          <div class="drop-inner">
            <div class="ico">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
            </div>
            <strong>Drop your PDF here</strong>
            <p class="sub">or <span class="pick">choose a file</span> — text-based PDFs or scanned documents</p>
          </div>
        </div>
        <input type="file" id="file" accept="application/pdf,.pdf" class="hidden">

        <div class="preview-scaler" id="preview-scaler">
          <div class="preview-page" id="preview"></div>
        </div>

      </div>
    </main>

  </div>
</div>

<script src="fonts.js?v=20260705"></script>
<script src="theme.js?v=20260705"></script>
<script src="pdf-tools.js?v=20260705"></script>
<script src="preview.js?v=20260705"></script>
<script src="pdf-export.js?v=20260705"></script>
<script src="app.js?v=20260705"></script>
</body>
</html>
